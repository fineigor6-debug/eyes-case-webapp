<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Кейсы</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

.cases-screen{
max-width:420px;
margin:auto;
min-height:100vh;
}

.cases-header{
height:70px;
display:flex;
align-items:center;
justify-content:center;
padding:0 15px;
position:relative;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.back-btn{
position:absolute;
left:15px;
width:40px;
height:40px;
border-radius:12px;
background:rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
border:none;
font-size:18px;
cursor:pointer;
}

.cases-title{
font-size:20px;
font-weight:800;
}

.cases-grid{
padding:16px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.case{
background:#141414;
border-radius:16px;
padding:14px;
text-align:center;
position:relative;
border:1px solid rgba(255,255,255,0.08);
transition:transform .15s ease;
}

.case:active{
transform:scale(0.96);
}

.case img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

.case h3{
font-size:15px;
margin-bottom:6px;
}

.price{
font-size:13px;
opacity:.7;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#00aaff;
padding:4px 7px;
font-size:10px;
border-radius:8px;
font-weight:700;
}

/* заблокированный кейс */

.case.disabled{
opacity:0.45;
filter:grayscale(1);
pointer-events:none;
}

</style>

</head>

<body>

<div class="cases-screen">

<!-- HEADER -->

<div class="cases-header">

<button class="back-btn" onclick="goBack()">
⬅
</button>

<div class="cases-title">
Кейсы
</div>

</div>

<!-- КЕЙСЫ -->

<div class="cases-grid">

<!-- DAILY CASE (ЗАБЛОКИРОВАН) -->

<div class="case disabled">

<div class="badge">
LOCK
</div>

<img src="IMG_0640.jpeg">

<h3>Ежедневный кейс</h3>

<div class="price">
Скоро
</div>

</div>

<!-- TEST CASE -->

<div class="case" onclick="window.location.href='case.html'">

<div class="badge">
TEST
</div>

<img src="IMG_0664.png">

<h3>Тестовый кейс</h3>

<div class="price">
1 ⭐
</div>

</div>

</div>

</div>

<script src="main.js"></script>

<script>

const tg = window.Telegram.WebApp
tg.ready()

setTimeout(()=>{
tg.expand()
},200)

function openTestCase(){
window.location.href="case.html"
}

function goBack(){
window.location.href="index.html"
}

</script>

</body>

</html>
