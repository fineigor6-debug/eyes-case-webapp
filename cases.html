<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Кейсы</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
-webkit-tap-highlight-color: transparent;
}

.case{
transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.case:active{
transform: scale(0.96);
}

.back-btn{
transition: transform 0.15s ease;
}

.back-btn:active{
transform: scale(0.9);
}

.cases-grid{
animation: fadeCases 0.35s ease;
}

@keyframes fadeCases{

from{
opacity:0;
transform: translateY(10px);
}

to{
opacity:1;
transform: translateY(0);
}

}

</style>

</head>

<body>

<div class="app">  <!-- ВОТ ЭТО ВАЖНО -->

<div class="cases-screen">

<!-- HEADER -->

<div class="cases-header">

<button class="back-btn" onclick="goBack()">
<svg width="30" height="30" viewBox="0 0 24 24">
<path d="M15 18L9 12L15 6"
stroke="white"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>
</button>

<h2 class="cases-title">Кейсы</h2>

</div>

<!-- GRID С КЕЙСАМИ -->

<div class="cases-grid">

<div class="case" onclick="openDailyCase()">

<div class="badge">Ежедневный</div>

<img src="IMG_0640.jpeg">

<h3>Ежедневный кейс</h3>

<div class="price">Бесплатно</div>

</div>

<div class="case" onclick="openTestCase()">

<div class="badge">NEW</div>

<img src="test.png">

<h3>Тестовый кейс</h3>

<div class="price">1 ⭐</div>

</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
