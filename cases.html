<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Кейсы</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* контейнер */

.cases-screen{
max-width:420px;
margin:auto;
padding:16px;
}

/* header */

.cases-header{
display:flex;
align-items:center;
gap:14px;
margin-bottom:20px;
}

.back-btn{
background:none;
border:none;
cursor:pointer;
}

.cases-title{
font-size:22px;
font-weight:800;
}

/* grid кейсов */

.cases-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

/* карточка кейса */

.case{
background:#141414;
border-radius:16px;
padding:14px;
text-align:center;
position:relative;
border:1px solid rgba(255,255,255,0.08);
transition:transform .15s;
}

.case:active{
transform:scale(0.96);
}

/* картинка */

.case img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

/* название */

.case h3{
font-size:15px;
margin-bottom:6px;
}

/* цена */

.price{
font-size:13px;
opacity:.7;
}

/* badge */

.badge{
position:absolute;
top:10px;
left:10px;
background:#00aaff;
padding:4px 7px;
font-size:10px;
border-radius:8px;
font-weight:700;
}

</style>

</head>

<body>

<div class="cases-screen">

<div class="cases-header">

<button class="back-btn" onclick="goBack()">
⬅
</button>

<div class="cases-title">
Кейсы
</div>

</div>

<div class="cases-grid">

<!-- DAILY CASE -->

<div class="case" onclick="openDailyCase()">

<div class="badge">
FREE
</div>

<img src="IMG_0640.jpeg">

<h3>Ежедневный кейс</h3>

<div class="price">
Бесплатно
</div>

</div>

<!-- TEST CASE -->

<div class="case" onclick="openTestCase()">

<div class="badge">
NEW
</div>

<img src="test.png">

<h3>Тестовый кейс</h3>

<div class="price">
1 ⭐
</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
