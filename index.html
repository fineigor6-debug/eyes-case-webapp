<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Eyes Case</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* ---------------------- */
/* DESIGN SYSTEM */
/* ---------------------- */

:root{

--bg:#0a0a1a;
--card:rgba(255,255,255,0.08);
--accent:#00f2ff;
--gold:#ffcc00;

}

/* убрать tap highlight */

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

/* базовый фон */

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:white;
}

/* mobile container */

.app{

max-width:480px;
margin:0 auto;
padding:16px;

}

/* header */

.header{

display:flex;
justify-content:space-between;
align-items:center;

padding:14px;
margin-bottom:18px;

background:var(--card);
border-radius:14px;

}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
}

.subtitle{
font-size:12px;
opacity:0.6;
}

.balance{

font-weight:600;
color:var(--gold);

}

/* gifts */

.gifts{

display:flex;
gap:10px;
margin-bottom:20px;

}

.gift{

flex:1;

background:var(--card);

border-radius:14px;

padding:14px;

text-align:center;

font-size:22px;

}

.gift-price{

font-size:12px;
margin-top:6px;
opacity:0.7;

}

/* banner */

.banner{

background:var(--card);

border-radius:16px;

padding:20px;

}

.banner-text h2{

margin:0 0 6px 0;

}

.banner-text p{

margin:0 0 14px 0;
opacity:0.7;

}

button{

background:var(--accent);
border:none;
padding:12px 16px;
border-radius:10px;
color:black;
font-weight:600;

}

</style>

</head>

<body>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="profile">

<img id="avatar" class="avatar">

<div>
<div id="username">Player</div>
<div class="subtitle">Eyes Case</div>
</div>

</div>

<div class="balance">
⭐ 0.03
</div>

</div>


<!-- ПОДАРКИ -->

<div class="gifts">

<div class="gift">
🍭
<div class="gift-price">4.62 ⭐</div>
</div>

<div class="gift">
🍰
<div class="gift-price">4.93 ⭐</div>
</div>

<div class="gift">
🍬
<div class="gift-price">8.55 ⭐</div>
</div>

</div>


<!-- КЕЙС -->

<div class="banner case-banner">

<div class="banner-text">

<h2>Кейсы</h2>
<p>Открывай кейс и получай NFT подарки</p>

<button onclick="openCases()">Крутить кейсы</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
