<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Eyes Case</title>

<link rel="stylesheet" href="style.css">

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="profile">

<img id="avatar" class="avatar" src="" alt="avatar">

<div class="profile-info">
<div id="username">Player</div>
<div class="subtitle">Eyes Case</div>
</div>

</div>

<div class="balance">
⭐ <span id="balance">0</span>
</div>

</div>

<!-- BANNER -->

<div class="banner">

<div class="banner-text">

<h2>Кейсы</h2>

<p>Открывай кейсы и получай NFT</p>

<button onclick="openCases()">
Крутить кейсы
</button>

</div>

</div>

</div>

<!-- MENU -->

<div class="menu">

<div class="menu-item active" onclick="goHome()">
🏠
<span>Главная</span>
</div>

<div class="menu-item" onclick="openCases()">
🎁
<span>Кейсы</span>
</div>

<div class="menu-item" onclick="openInventory()">
🎒
<span>Инвентарь</span>
</div>

<div class="menu-item" onclick="openProfile()">
👤
<span>Профиль</span>
</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="app.js" defer></script>

</body>
</html>
