<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Eyes Case</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

:root{
--accent:#00f2ff;
--gold:#ffcc00;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
width:100%;
max-width:100%;
overflow-x:hidden;
}

body{
width:100%;
max-width:100%;
overflow-x:hidden;
touch-action:pan-y;
}

.app{
max-width:420px;
width:100%;
margin:auto;
min-height:100vh;
overflow:hidden;
}

</style>

</head>

<body>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="profile">

<img id="avatar" class="avatar">

<div>
<div id="username">Player</div>
<div class="subtitle">Eyes Case</div>
</div>

</div>

<div class="balance">
⭐ 0.03
</div>

</div>

<!-- КЕЙС -->

<div class="banner case-banner">

<div class="banner-text">

<h2>Кейсы</h2>
<p>Открывай кейс и получай NFT подарки</p>

<button onclick="openCases()">Крутить кейсы</button>

</div>

</div>

</div>

<script src="app.js"></script>

<script>

const tg = window.Telegram.WebApp
tg.ready()

setTimeout(()=>{
tg.expand()
},200)

document.addEventListener("touchmove",function(e){

if(e.touches.length==1){

let touch=e.touches[0]

if(touch.clientX<0 || touch.clientX>window.innerWidth){
e.preventDefault()
}

}

},{passive:false})

</script>

</body>
</html>
