<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Тестовый кейс</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="cases-page">

<div class="cases-header">

<button class="back-btn" onclick="goBack()">
⬅
</button>

<div class="cases-title" id="caseTitle">
Тестовый кейс
</div>

</div>

<div class="roulette">

<div class="pointer"></div>

<div class="roulette-track" id="rouletteTrack"></div>

</div>

<button id="openCaseBtn" onclick="spinCase()">
Открыть кейс
</button>

<div id="cooldownTimer"></div>

<div class="prizes">

<h3>Возможные призы</h3>

<div id="prizeList"></div>

</div>

</div>

<div id="winPopup" class="win-popup">

<div class="win-card">

<div class="win-title">
🎉 ВЫ ВЫИГРАЛИ
</div>

<div id="winItem" class="win-item">
10 ⭐
</div>

<button onclick="closeWinPopup()">
Забрать
</button>

</div>

</div>

<div class="achievement-popup" id="achievementPopup">

<div class="achievement-popup-icon">
🏆
</div>

<div>

<div class="achievement-popup-title">
Achievement Unlocked
</div>

<div class="achievement-popup-name" id="achievementPopupName">
Case Hunter
</div>

</div>

</div>

<script src="main.js"></script>
<script src="roulette.js"></script>

</body>
</html>
