<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ежедневный кейс</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="cases-page">

<!-- HEADER КАК НА ДРУГИХ ЭКРАНАХ -->

<div class="cases-header">

<button class="back-btn" onclick="goBack()">
⬅
</button>

<div class="cases-title" id="caseTitle">
Ежедневный кейс
</div>

</div>


<!-- РУЛЕТКА -->

<div class="roulette">

<div class="pointer"></div>

<div class="roulette-track" id="rouletteTrack"></div>

</div>


<!-- ТЕКУЩИЙ ДРОП (ВО ВРЕМЯ ПРОКРУТКИ) -->

<div class="rolling-drop-box">

<div class="rolling-label">
Возможный выигрыш
</div>

<div id="rollingDrop" class="rolling-drop">
⭐ 0
</div>

</div>


<!-- КНОПКА ОТКРЫТИЯ -->

<button id="openCaseBtn" onclick="spinCase()">
Открыть кейс
</button>

<div id="cooldownTimer"></div>


<!-- СПИСОК ПРИЗОВ -->

<div class="prizes">

<h3>Возможные призы</h3>

<div id="prizeList"></div>

</div>

</div>

<script src="main.js"></script>
<script src="roulette.js"></script>

</body>
</html>
