<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Профиль</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="app">

<div class="header">
<h2>Профиль</h2>
</div>

<div class="profile-page">

<div class="profile-avatar">
<img id="profileAvatar" src="" alt="avatar">
</div>

<h3 id="profileName">Player</h3>

<div class="profile-id">
ID: <span id="playerId">—</span>
</div>


<!-- LEVEL -->

<div class="profile-level">

<div class="level-title">
LEVEL <span id="playerLevel">1</span>
</div>

<div class="xp-bar">
<div class="xp-fill" id="xpFill"></div>
</div>

<div class="xp-text">
<span id="currentXP">0</span> / <span id="nextXP">100</span> XP
</div>

</div>


<!-- BALANCE -->

<div class="balance-box">

<div class="balance-title">
Баланс
</div>

<div class="balance-content">

<div class="balance-icon">
⭐
</div>

<div class="stars-count" id="balance">
0
</div>

</div>

</div>


<!-- STATS -->

<div class="profile-stats">

<div class="stat">
<span>Кейсов открыто</span>
<b id="casesOpened">0</b>
</div>

<div class="stat">
<span>NFT выбито</span>
<b id="nftWon">0</b>
</div>

<div class="stat">
<span>Лучший дроп</span>
<b id="bestDrop">—</b>
</div>

</div>


<!-- TOP ITEMS -->

<div class="top-drops">

<h3>Лучшие предметы</h3>

<div class="top-items" id="topItems">

<div class="top-item"></div>
<div class="top-item"></div>
<div class="top-item"></div>

</div>

</div>


<!-- BUTTONS -->

<button onclick="openAchievements()">
🏆 Достижения
</button>

<button id="adminPanelBtn" onclick="openAdmin()" style="display:none">
⚙️ Админ панель
</button>


</div>

</div>


<!-- MENU -->

<div class="menu">

<div class="menu-item" onclick="goHome()">
🏠
<span>Главная</span>
</div>

<div class="menu-item" onclick="openCases()">
🎁
<span>Кейсы</span>
</div>

<div class="menu-item" onclick="openInventory()">
🎒
<span>Инвентарь</span>
</div>

<div class="menu-item active">
👤
<span>Профиль</span>
</div>

</div>

<script src="main.js"></script>

</body>
</html>
