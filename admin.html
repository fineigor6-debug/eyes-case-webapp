<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Panel</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
}

.admin-panel{
max-width:420px;
margin:40px auto;
padding:20px;
background:#1b1b1b;
border-radius:14px;
}

.admin-title{
text-align:center;
font-size:22px;
margin-bottom:20px;
}

.admin-input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
font-size:14px;
}

.admin-buttons{
display:flex;
gap:10px;
}

.admin-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;
}

.btn-give{
background:#2ecc71;
color:white;
}

.btn-remove{
background:#e74c3c;
color:white;
}

</style>

</head>

<body>

<div class="admin-panel">

<div class="admin-title">
Админ панель
</div>

<input 
id="adminUserId"
class="admin-input"
placeholder="Telegram ID игрока"
>

<input 
id="adminStars"
class="admin-input"
placeholder="Количество ⭐"
>

<div class="admin-buttons">

<button 
class="btn-give"
onclick="adminGiveStars()">
Выдать
</button>

<button 
class="btn-remove"
onclick="adminRemoveStars()">
Забрать
</button>

</div>

</div>

<script src="admin.js"></script>

</body>
</html>
